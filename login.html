<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EAHA | Secure Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific styles to center the login portal perfectly */
    body.login-body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--bg);
      background-image: radial-gradient(circle at top right, color-mix(in srgb, var(--primary) 15%, transparent), transparent 40%);
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
      padding: 40px 30px;
      border-top: 5px solid var(--primary);
      text-align: center;
    }
    .auth-view { display: none; animation: fadeIn 0.3s ease-in-out; }
    .auth-view.active { display: block; }
    .auth-logo {
      font-size: 1.8em;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    .auth-subtitle {
      color: var(--muted);
      font-size: 0.9em;
      margin-bottom: 30px;
    }
    .auth-links {
      margin-top: 20px;
      font-size: 0.85em;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
    }
    .auth-links a { cursor: pointer; color: var(--info); font-weight: 600; }
    .auth-links a:hover { text-decoration: underline; }
  </style>
</head>
<body class="login-body">

  <div class="card auth-card">
    <div class="auth-logo">EAHA</div>
    <div class="auth-subtitle">Elys Astra Helper Application</div>

    <div id="view-login" class="auth-view active">
      <h2 style="margin-bottom: 20px;">Welcome Back</h2>
      <div class="form-grid">
        <label class="field" style="text-align: left;">
          <span>Email Address</span>
          <input type="email" id="loginEmail" placeholder="admin@example.com">
        </label>
        <label class="field" style="text-align: left;">
          <span>Password</span>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </label>
        <button class="btn full-width" id="btnLogin" style="margin-top: 10px; padding: 15px; font-size: 1.1em;">Sign In</button>
      </div>

      <div style="display: flex; align-items: center; margin: 20px 0;">
        <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
        <span class="muted" style="padding: 0 10px; font-size: 0.85em; text-transform: uppercase;">Or</span>
        <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
      </div>
      <button class="btn full-width" id="btnGoogleLogin" style="background-color: #fff; color: #000; border: none; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; font-size: 1.05em; transition: transform 0.2s;">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          <path d="M1 1h22v22H1z" fill="none"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-links">
        <a onclick="switchView('view-register')">Create Account</a>
        <a onclick="switchView('view-forgot')">Forgot Password?</a>
      </div>
    </div>

    <div id="view-register" class="auth-view">
      <h2 style="margin-bottom: 20px;">Create Account</h2>
      <div class="form-grid">
        <label class="field" style="text-align: left;">
          <span>Email Address</span>
          <input type="email" id="regEmail" placeholder="you@example.com">
        </label>
        <label class="field" style="text-align: left;">
          <span>Password</span>
          <input type="password" id="regPassword" placeholder="Minimum 6 characters">
        </label>
        <button class="btn full-width" id="btnRegister" style="margin-top: 10px; padding: 15px; font-size: 1.1em; background-color: var(--success);">Sign Up</button>
      </div>
      <div class="auth-links" style="justify-content: center;">
        <span class="muted">Already have an account? <a onclick="switchView('view-login')">Log In</a></span>
      </div>
    </div>

    <div id="view-forgot" class="auth-view">
      <h2 style="margin-bottom: 20px;">Reset Password</h2>
      <p class="muted" style="margin-bottom: 20px; font-size: 0.9em;">Enter your email and we'll send you a link to reset your password.</p>
      <div class="form-grid">
        <label class="field" style="text-align: left;">
          <span>Email Address</span>
          <input type="email" id="resetEmail" placeholder="you@example.com">
        </label>
        <button class="btn full-width" id="btnReset" style="margin-top: 10px; padding: 15px; font-size: 1.1em; background-color: var(--accent);">Send Reset Link</button>
      </div>
      <div class="auth-links" style="justify-content: center;">
        <span class="muted">Remembered your password? <a onclick="switchView('view-login')">Log In</a></span>
      </div>
    </div>

    <p id="authMessage" style="margin-top: 20px; font-size: 0.9em; font-weight: bold; color: var(--danger); min-height: 20px;"></p>

  </div>

  <script>
    // Simple UI View Switching Logic
    window.switchView = function(viewId) {
      document.querySelectorAll('.auth-view').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.getElementById('authMessage').innerText = ''; // Clear errors on switch
    };
  </script>
  
  <script type="module" src="login.js"></script>

</body>
</html>
